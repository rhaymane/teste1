<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HELP.Miau - Plataforma de adoção responsável</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🐾 HELP.Miau - Plataforma de adoção responsável</h1>
<p>Conectando animais resgatados a novos lares</p>

</header>

<section class="cadastro">

<h2>Cadastrar Animal</h2>

<form id="formAnimal">

<input type="text" id="nome" placeholder="Nome do animal" required>

<select id="especie">
<option>Cachorro</option>
<option>Gato</option>
</select>

<input type="text" id="idade" placeholder="Idade">

<textarea id="descricao" placeholder="Descrição"></textarea>

<button type="submit">Cadastrar</button>

</form>

</section>

<section class="lista">

<h2>Animais Disponíveis</h2>

<div id="listaAnimais"></div>

</section>

<script src="script.js"></script>

</body>

</html>
